openapi: 3.1.0
info:
  title: Example Todo API
  version: 1.0.0
servers:
  - url: https://api.example.test
paths:
  /todos:
    get:
      operationId: listTodos
      summary: List todos
      description: Returns todos, optionally filtered by completion state.
      tags: [todos]
      parameters:
        - name: completed
          in: query
          required: false
          description: Filter by completion state.
          schema:
            type: boolean
      responses:
        '200':
          description: A list of todos.
          content:
            application/json:
              schema:
                type: object
                properties:
                  todos:
                    type: array
                    items:
                      $ref: '#/components/schemas/Todo'
    post:
      operationId: createTodo
      summary: Create a todo
      description: Creates a new todo item with a title and optional due date.
      tags: [todos]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
                  description: Todo title.
                due_date:
                  type: string
                  format: date
                  description: Optional due date.
      responses:
        '201':
          description: Created todo.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Todo'
  /todos/{todo_id}:
    get:
      operationId: getTodo
      summary: Get a todo
      tags: [todos]
      parameters:
        - name: todo_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Todo detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Todo'
components:
  schemas:
    Todo:
      type: object
      required: [id, title, completed]
      properties:
        id:
          type: string
        title:
          type: string
        completed:
          type: boolean
        due_date:
          type: string
          format: date
          nullable: true
