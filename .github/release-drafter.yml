name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
template: |
  ## What's changed

  $CHANGES

  **Full changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION

categories:
  - title: Features
    labels:
      - feature
      - enhancement
  - title: Fixes
    labels:
      - bug
      - fix
  - title: Documentation
    labels:
      - documentation
      - docs
  - title: Maintenance
    labels:
      - chore
      - ci
      - dependencies
change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
change-title-escapes: "\\<*_&"
version-resolver:
  major:
    labels:
      - "major"
      - "breaking"
  minor:
    labels:
      - "minor"
      - "feature"
      - "enhancement"
  patch:
    labels:
      - "patch"
      - "fix"
      - "bug"
      - "chore"
      - "documentation"
      - "docs"
      - "dependencies"
  default: patch
autolabeler:
  - label: documentation
    files:
      - "*.md"
      - "docs/**"
  - label: ci
    files:
      - ".github/**"
  - label: dependencies
    files:
      - "pyproject.toml"
      - "Dockerfile"
exclude-labels:
  - skip-changelog
