name: Feature request
description: Suggest a new capability for OAS Atlas
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case, not just the proposed solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like OAS Atlas to behave?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: surface
    attributes:
      label: Which surface does this touch?
      multiple: true
      options:
        - CLI
        - HTTP search API
        - MCP server
        - Crawler / discovery
        - Normalizer
        - Auth profiles / HTTP execution
        - Docs / examples
        - CI / release
    validations:
      required: true
  - type: checkboxes
    id: contributor
    attributes:
      label: Are you willing to contribute this?
      options:
        - label: I am willing to send a PR.
