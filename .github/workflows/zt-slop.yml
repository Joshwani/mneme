name: zt-slop

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      # v0.2.2
      - uses: Joshwani/zt-slop@d7fe4fe778dcbc78760aa92c4b6fe6cebf82914e
        with:
          fail-on: block
