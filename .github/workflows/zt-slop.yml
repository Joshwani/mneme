name: zt-slop

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      # v0.2.1
      - uses: Joshwani/zt-slop@c77fcfa084ed510372bcb6e11b21104d1d4ecd09
        with:
          fail-on: block
